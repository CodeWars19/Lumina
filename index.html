<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumina — Palm Reading</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Plus+Jakarta+Sans:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg0: #07081a;
    --bg1: #0d0f2b;
    --bg2: #12144a;
    --purple: #a78bfa;
    --blue: #7dd3fc;
    --soft: #c4b5fd;
    --white: #f0f0ff;
    --dim: rgba(240,240,255,0.55);
    --card: rgba(255,255,255,0.04);
    --border: rgba(167,139,250,0.2);
    --glow-p: rgba(167,139,250,0.35);
    --glow-b: rgba(125,211,252,0.25);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    height: 100%;
    background: var(--bg0);
    color: var(--white);
    font-family: 'DM Sans', system-ui, sans-serif;
    overflow-x: hidden;
  }

  /* ── Dreamy animated background ── */
  .bg-scene {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }

  .bg-scene::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 15% 20%, rgba(99,62,195,0.28) 0%, transparent 65%),
      radial-gradient(ellipse 60% 50% at 85% 70%, rgba(56,100,210,0.22) 0%, transparent 60%),
      radial-gradient(ellipse 70% 40% at 50% 100%, rgba(120,80,220,0.18) 0%, transparent 55%),
      linear-gradient(160deg, #07081a 0%, #0b0d2e 40%, #080e28 100%);
  }

  .cloud {
    position: absolute;
    border-radius: 50%;
    filter: blur(55px);
    animation: drift var(--dur) ease-in-out infinite alternate;
    opacity: 1;
  }
  .cloud:nth-child(1) { width:600px;height:300px;top:5%;left:-10%;background:rgba(120,80,200,0.18);--dur:18s; }
  .cloud:nth-child(2) { width:500px;height:250px;top:30%;right:-8%;background:rgba(60,120,220,0.15);--dur:22s;animation-delay:-7s; }
  .cloud:nth-child(3) { width:700px;height:280px;bottom:10%;left:10%;background:rgba(100,60,210,0.14);--dur:26s;animation-delay:-12s; }
  .cloud:nth-child(4) { width:400px;height:200px;top:55%;left:30%;background:rgba(150,100,240,0.10);--dur:20s;animation-delay:-4s; }

  @keyframes drift {
    0%   { transform: translate(0,0) scale(1); }
    50%  { transform: translate(30px, -20px) scale(1.05); }
    100% { transform: translate(-20px, 15px) scale(0.97); }
  }

  #star-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  /* ── Layout ── */
  .app {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 20px 40px;
  }

  /* ── Header ── */
  header {
    text-align: center;
    margin-bottom: 36px;
    animation: riseIn 1s cubic-bezier(.2,.8,.2,1) both;
  }

  .moon-emoji {
    font-size: 2.4rem;
    display: block;
    margin-bottom: 10px;
    filter: drop-shadow(0 0 16px var(--glow-p));
    animation: moonFloat 4s ease-in-out infinite;
  }
  @keyframes moonFloat {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  h1 {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    font-size: clamp(2.6rem,7vw,3.6rem);
    font-weight: 700;
    background: linear-gradient(135deg, #c4b5fd 0%, #7dd3fc 55%, #e0c3fc 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.01em;
    line-height: 1.1;
  }

  .tagline {
    font-family: 'DM Sans', system-ui, sans-serif;
    font-size: 0.95rem;
    color: var(--dim);
    margin-top: 8px;
    letter-spacing: 0.06em;
  }

  /* ── Card ── */
  .card {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(167,139,250,0.08),
      0 20px 60px rgba(0,0,0,0.5),
      0 0 80px rgba(120,80,200,0.08);
  }

  #camera-section { display: flex; flex-direction: column; align-items: center; gap: 0; width: 100%; }

  .viewfinder {
    position: relative;
    width: 100%;
    aspect-ratio: 4/3;
    background: rgba(0,0,0,0.5);
    border-radius: 24px 24px 0 0;
    overflow: hidden;
  }

  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
    display: block;
  }

  .viewfinder::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(7,8,26,0.55) 100%);
    pointer-events: none;
    z-index: 2;
  }

  .palm-ring {
    position: absolute;
    inset: 0;
    z-index: 3;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .palm-ring-inner {
    width: 150px;
    height: 185px;
    border: 1.5px solid rgba(167,139,250,0.45);
    border-radius: 60% 60% 40% 40%;
    box-shadow: 0 0 20px rgba(167,139,250,0.2), inset 0 0 20px rgba(167,139,250,0.05);
    animation: ringPulse 3s ease-in-out infinite;
  }
  @keyframes ringPulse {
    0%,100% { opacity:.45; transform: scale(1); }
    50%      { opacity:.8;  transform: scale(1.03); }
  }
  .palm-ring-inner.detected {
    border-color: rgba(167,139,250,0.8);
    box-shadow: 0 0 30px rgba(167,139,250,0.4), inset 0 0 30px rgba(167,139,250,0.1);
    animation: ringPulse 1.5s ease-in-out infinite;
  }

  .scan-bar {
    position: absolute;
    left: 5%;
    right: 5%;
    height: 1.5px;
    background: linear-gradient(to right, transparent, var(--purple), var(--blue), var(--purple), transparent);
    box-shadow: 0 0 12px var(--glow-p), 0 0 24px var(--glow-b);
    border-radius: 2px;
    top: 50%;
    z-index: 4;
    display: none;
    animation: scanAnim 2s ease-in-out infinite;
  }
  .scan-bar.active { display: block; }
  @keyframes scanAnim {
    0%   { top: 10%; opacity: .7; }
    50%  { top: 88%; opacity: 1;  }
    100% { top: 10%; opacity: .7; }
  }

  .scan-label {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    display: none;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--soft);
    text-shadow: 0 0 10px var(--glow-p);
    animation: blinkLabel 1.4s ease-in-out infinite;
    white-space: nowrap;
  }
  .scan-label.active { display: block; }
  @keyframes blinkLabel {
    0%,100% { opacity:.5; } 50% { opacity:1; }
  }

  .no-cam-msg {
    display: none;
    position: absolute;
    inset: 0;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 10px;
    color: var(--dim);
    font-style: italic;
    font-size: 0.95rem;
    text-align: center;
    padding: 24px;
    z-index: 6;
  }

  canvas { display: none; }

  .card-body {
    padding: 24px 24px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    width: 100%;
  }

  .hint {
    font-size: 0.9rem;
    color: var(--dim);
    text-align: center;
    line-height: 1.6;
    font-weight: 300;
  }
  .hint strong { color: var(--soft); font-weight: 600; }

  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 14px 36px;
    background: linear-gradient(135deg, rgba(167,139,250,0.22), rgba(125,211,252,0.15));
    border: 1px solid rgba(167,139,250,0.45);
    border-radius: 50px;
    color: var(--white);
    font-family: 'DM Sans', system-ui, sans-serif;
    font-weight: 600;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all .25s ease;
    backdrop-filter: blur(8px);
    letter-spacing: 0.03em;
    text-shadow: 0 0 12px var(--glow-p);
    box-shadow: 0 0 20px rgba(167,139,250,0.1), 0 4px 16px rgba(0,0,0,0.3);
    position: relative;
    overflow: hidden;
  }
  .btn-primary::before {
    content:'';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(167,139,250,0.3), rgba(125,211,252,0.2));
    opacity: 0;
    transition: opacity .25s;
    border-radius: inherit;
  }
  .btn-primary:hover::before { opacity: 1; }
  .btn-primary:hover { box-shadow: 0 0 32px rgba(167,139,250,0.25), 0 6px 24px rgba(0,0,0,0.4); transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { opacity: .35; cursor: not-allowed; transform: none; }
  .btn-primary:disabled:hover::before { opacity: 0; }

  .btn-ghost {
    background: transparent;
    border: 1px solid rgba(167,139,250,0.2);
    border-radius: 50px;
    color: var(--dim);
    font-family: 'DM Sans', system-ui, sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    padding: 9px 22px;
    cursor: pointer;
    transition: all .2s;
    letter-spacing: 0.04em;
  }
  .btn-ghost:hover { border-color: rgba(167,139,250,0.45); color: var(--soft); }

  /* ── Reading ── */
  #reading-section {
    display: none;
    flex-direction: row;
    align-items: stretch;
    width: 100%;
    max-width: 960px;
    gap: 0;
    animation: riseIn .7s cubic-bezier(.2,.8,.2,1) both;
  }
  #reading-section.active { display: flex; }
  @media (max-width: 540px) {
    #reading-section { flex-direction: column; }
    .reading-palm-sidebar { max-height: 200px; min-height: 180px; }
  }

  .reading-palm-sidebar {
    width: 165px;
    min-width: 140px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px;
    background: rgba(0,0,0,0.25);
    border-right: 1px solid var(--border);
    border-radius: 24px 0 0 24px;
  }
  @media (max-width: 540px) {
    .reading-palm-sidebar { border-right: none; border-bottom: 1px solid var(--border); border-radius: 24px 24px 0 0; }
  }
  .reading-palm-sidebar h4 {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    font-size: 0.75rem;
    color: var(--soft);
    margin-bottom: 8px;
    letter-spacing: 0.04em;
  }
  .palm-reference-wrap {
    width: 100%;
    max-height: 220px;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid rgba(167,139,250,0.3);
  }
  .palm-reference-wrap img {
    width: 100%;
    height: auto;
    object-fit: contain;
    display: block;
  }

  .reading-chat-area {
    flex: 1;
    min-width: 0;
    min-height: 0;
    display: flex;
    flex-direction: column;
    border-radius: 0 24px 24px 0;
    overflow: hidden;
  }
  @media (max-width: 540px) { .reading-chat-area { border-radius: 0; } }

  .thumb-strip {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 20px;
    background: rgba(167,139,250,0.05);
    border-bottom: 1px solid var(--border);
  }
  .thumb-img {
    width: 56px;
    height: 56px;
    border-radius: 12px;
    object-fit: cover;
    border: 1.5px solid rgba(167,139,250,0.35);
    transform: scaleX(-1);
    flex-shrink: 0;
  }
  .thumb-info h3 {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    font-size: 1rem;
    color: var(--soft);
  }
  .thumb-info p {
    font-size: 0.78rem;
    color: var(--dim);
    margin-top: 2px;
  }
  .live-dot {
    width: 7px; height: 7px;
    background: #86efac;
    border-radius: 50%;
    display: inline-block;
    margin-right: 5px;
    box-shadow: 0 0 6px #86efac;
    animation: livePulse 2s ease-in-out infinite;
  }
  @keyframes livePulse {
    0%,100% { opacity:1; } 50% { opacity:.4; }
  }

  .chat-scroll {
    width: 100%;
    height: 480px;
    overflow-y: auto;
    padding: 20px 20px 8px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scrollbar-width: thin;
    scrollbar-color: rgba(167,139,250,0.18) transparent;
  }
  .chat-scroll::-webkit-scrollbar { width: 3px; }
  .chat-scroll::-webkit-scrollbar-thumb { background: rgba(167,139,250,0.18); border-radius: 2px; }

  .msg {
    display: flex;
    gap: 10px;
    animation: riseIn .35s ease both;
  }
  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
    border: 1px solid var(--border);
    background: rgba(167,139,250,0.08);
  }

  .bubble {
    max-width: 78%;
    padding: 11px 15px;
    border-radius: 18px;
    font-size: 0.9rem;
    line-height: 1.65;
  }
  .msg.ai .bubble {
    max-width: 95%;
    background: rgba(167,139,250,0.09);
    border: 1px solid rgba(167,139,250,0.18);
    border-radius: 4px 18px 18px 18px;
    color: var(--white);
    font-family: 'DM Sans', system-ui, sans-serif;
  }
  .msg.user .bubble {
    background: linear-gradient(135deg, rgba(167,139,250,0.2), rgba(125,211,252,0.12));
    border: 1px solid rgba(167,139,250,0.28);
    border-radius: 18px 4px 18px 18px;
    color: var(--white);
  }

  .typing-dots {
    display: inline-flex;
    gap: 4px;
    align-items: center;
    padding: 2px 0;
  }
  .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--purple);
    animation: dotBounce 1.3s ease-in-out infinite;
    opacity: .6;
  }
  .dot:nth-child(2) { animation-delay:.18s; }
  .dot:nth-child(3) { animation-delay:.36s; }

  .question-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 12px 16px;
    background: rgba(0,0,0,0.15);
    border-top: 1px solid var(--border);
  }
  .question-buttons .q-btn {
    background: rgba(167,139,250,0.12);
    border: 1px solid rgba(167,139,250,0.3);
    border-radius: 12px;
    padding: 8px 14px;
    color: var(--soft);
    font-family: 'DM Sans', system-ui, sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all .2s;
    max-width: 100%;
    text-align: left;
  }
  .question-buttons .q-btn:hover {
    background: rgba(167,139,250,0.22);
    border-color: rgba(167,139,250,0.5);
  }

  .feedback-box {
    margin-top: 8px;
    padding: 8px 10px;
    border-radius: 10px;
    border: 1px solid rgba(167,139,250,0.25);
    background: rgba(0,0,0,0.2);
    font-size: 0.78rem;
    color: var(--dim);
  }
  .feedback-buttons {
    display: flex;
    gap: 8px;
    margin-top: 6px;
    margin-bottom: 4px;
  }
  .feedback-btn {
    border-radius: 999px;
    border: 1px solid rgba(167,139,250,0.35);
    background: rgba(167,139,250,0.12);
    color: var(--soft);
    padding: 4px 10px;
    font-size: 0.75rem;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .feedback-btn.neg {
    border-color: rgba(248,113,113,0.5);
    background: rgba(248,113,113,0.1);
    color: #fecaca;
  }
  .feedback-btn:disabled {
    opacity: .5;
    cursor: default;
  }
  .feedback-detail {
    margin-top: 4px;
    display: none;
    flex-direction: column;
    gap: 4px;
  }
  .feedback-detail textarea {
    width: 100%;
    min-height: 40px;
    max-height: 80px;
    resize: vertical;
    border-radius: 8px;
    border: 1px solid rgba(167,139,250,0.35);
    background: rgba(0,0,0,0.3);
    padding: 6px 8px;
    color: var(--white);
    font-size: 0.8rem;
    font-family: 'DM Sans', system-ui, sans-serif;
  }
  .feedback-detail button {
    align-self: flex-start;
    border-radius: 999px;
    border: 1px solid rgba(167,139,250,0.5);
    background: rgba(167,139,250,0.24);
    color: var(--white);
    padding: 4px 10px;
    font-size: 0.75rem;
    cursor: pointer;
  }

  @keyframes dotBounce {
    0%,100% { transform:translateY(0); opacity:.4; }
    50%      { transform:translateY(-5px); opacity:1; }
  }

  .input-row {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    padding: 14px 16px;
    border-top: 1px solid var(--border);
    background: rgba(0,0,0,0.2);
    width: 100%;
  }
  #chat-input {
    flex: 1;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(167,139,250,0.2);
    border-radius: 14px;
    padding: 10px 14px;
    color: var(--white);
    font-family: 'DM Sans', system-ui, sans-serif;
    font-size: 0.9rem;
    resize: none;
    outline: none;
    line-height: 1.5;
    max-height: 100px;
    transition: border-color .2s;
    min-height: 40px;
  }
  #chat-input::placeholder { color: rgba(240,240,255,0.3); }
  #chat-input:focus { border-color: rgba(167,139,250,0.45); }
  #send-btn {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, rgba(167,139,250,0.3), rgba(125,211,252,0.2));
    border: 1px solid rgba(167,139,250,0.4);
    border-radius: 12px;
    color: var(--soft);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    transition: all .2s;
    flex-shrink: 0;
  }
  #send-btn:hover { background: rgba(167,139,250,0.35); box-shadow: 0 0 16px rgba(167,139,250,0.2); }
  #send-btn:disabled { opacity: .3; cursor: not-allowed; }

  .reset-row {
    text-align: center;
    padding: 16px 0 4px;
  }

  /* ── DOB Section ── */
  .dob-section {
    padding: 0 20px 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }
  .dob-section label {
    font-family: 'DM Sans', system-ui, sans-serif;
    font-size: 0.85rem;
    color: var(--dim);
    display: block;
    margin-bottom: 8px;
  }
  .dob-inputs {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .dob-inputs input, .dob-inputs select {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(167,139,250,0.25);
    border-radius: 10px;
    padding: 10px 12px;
    color: rgba(240,240,255,0.92);
    font-family: 'DM Sans', system-ui, sans-serif;
    font-size: 0.9rem;
    width: 70px;
  }
  .dob-inputs select option {
    color: #0b0d2e;
    background: #ffffff;
  }
  .dob-inputs select { width: 100px; cursor: pointer; }
  .dob-inputs input::placeholder { color: rgba(240,240,255,0.35); }
  .dob-inputs input:focus, .dob-inputs select:focus { border-color: rgba(167,139,250,0.5); outline: none; }

  .sparkle {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
    animation: sparkleFly var(--dur) ease-in infinite;
    animation-delay: var(--delay);
  }
  @keyframes sparkleFly {
    0%   { opacity:0; transform: translateY(0) scale(0); }
    20%  { opacity:.9; transform: translateY(-30px) scale(1); }
    100% { opacity:0; transform: translateY(-120px) scale(.3); }
  }

  @keyframes riseIn {
    from { opacity:0; transform: translateY(18px); }
    to   { opacity:1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="bg-scene">
  <div class="cloud"></div>
  <div class="cloud"></div>
  <div class="cloud"></div>
  <div class="cloud"></div>
  <canvas id="star-canvas"></canvas>
</div>

<div class="app">
  <header>
    <span class="moon-emoji">🌙</span>
    <h1>Lumina</h1>
    <p class="tagline">Your palm holds the map of your soul</p>
  </header>

  <div class="card" id="main-card">
    <!-- Camera -->
    <div id="camera-section">
      <div class="viewfinder" id="viewfinder">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
        <div class="palm-ring" id="palm-ring"><div class="palm-ring-inner"></div></div>
        <div class="scan-bar" id="scan-bar"></div>
        <div class="scan-label" id="scan-label">Reading your lines…</div>
        <div class="no-cam-msg" id="no-cam-msg">
          <span style="font-size:2rem">🔮</span>
          Camera not yet active.<br>Tap below to begin.
        </div>

      <div class="card-body">

            <input type="text" id="full-name" placeholder="Full name" oninput="checkUserInfo()" style="width: 220px; max-width: 100%;">

              <option value="">Month</option>
              <option value="1">January</option><option value="2">February</option><option value="3">March</option><option value="4">April</option>
              <option value="5">May</option><option value="6">June</option><option value="7">July</option><option value="8">August</option>
              <option value="9">September</option><option value="10">October</option><option value="11">November</option><option value="12">December</option>
            </select>
            <input type="number" id="dob-day" placeholder="Day" min="1" max="31" oninput="checkUserInfo()">

          <button class="btn-primary" id="capture-btn" onclick="captureAndRead()" disabled style="display:none">🔮 Read My Palm</button>

    <div id="reading-section">

          <img src="https://media.istockphoto.com/id/580101272/vector/palmistry-mystical-reading-vector-illustration.jpg?s=612x612&w=0&k=20&c=mmkofQGjn2qS5g2PMrn0UBsojW8QCQ5BlIzUxtxSkvg=" alt="Palm lines diagram: Heart, Head, Life, Fate">
        </div>
      </aside>
      <div class="reading-chat-area">

<script>
document.addEventListener('DOMContentLoaded', function() {
// ── Config ─────────────────────────────────────────
// API key is read server-side from Vercel env GEMINI_API_KEY (see /api/gemini.js).
// Use a model your key can access (AI Studio / Cloud). Override with Vercel env GEMINI_MODEL.
const GEMINI_MODEL = 'gemini-2.5-flash';

// ── Stars ──────────────────────────────────────────
const sc = document.getElementById('star-canvas');
const ctx2d = sc.getContext('2d');
let stars = [];

function resizeStars() {
  sc.width = window.innerWidth;
  sc.height = window.innerHeight;
  stars = Array.from({length:200}, () => ({
    x: Math.random()*sc.width,
    y: Math.random()*sc.height,
    r: Math.random()*1.5+0.3,
    speed: Math.random()*0.5+0.1,
    phase: Math.random()*Math.PI*2,
    col: Math.random()>.5 ? 'rgba(196,181,253,' : 'rgba(125,211,252,'
  }));
}
resizeStars();
window.addEventListener('resize', resizeStars);

let lastT = 0;
function animStars(t) {
  const dt = (t-lastT)/1000; lastT=t;
  ctx2d.clearRect(0,0,sc.width,sc.height);
  stars.forEach(s => {
    s.phase += dt*s.speed;
    const op = 0.12 + 0.55*(Math.sin(s.phase)*.5+.5);
    ctx2d.beginPath();
    ctx2d.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx2d.fillStyle = s.col+op+')';
    ctx2d.fill();
  });
  requestAnimationFrame(animStars);
}
requestAnimationFrame(animStars);

// ── Sparkles ──────────────────────────────────────
function spawnSparkle() {
  const sp = document.createElement('div');
  sp.className = 'sparkle';
  const colors = ['#c4b5fd','#7dd3fc','#e9d5ff','#bae6fd'];
  const sz = (Math.random()*2+2).toFixed(1);
  sp.style.cssText = `
    left:${Math.random()*100}vw; bottom:${Math.random()*25}vh;
    background:${colors[Math.floor(Math.random()*colors.length)]};
    width:${sz}px; height:${sz}px;
    box-shadow:0 0 6px currentColor;
    --dur:${(Math.random()*3+2).toFixed(1)}s;
    --delay:${(Math.random()*2).toFixed(1)}s;
  `;
  document.body.appendChild(sp);
  setTimeout(()=>sp.remove(), 6000);
}
setInterval(spawnSparkle, 650);

// ── Hand Detection (auto-capture when palm stable) ──
let handDetectionInterval = null;
let handDetected = false;
const STABLE_FRAMES = 8; // ~1.6s at 200ms = capture when palm held steady
let stableCount = 0;

function detectHandInFrame() {
  if (!video || !canvas || !video.videoWidth) return false;

  const ctx = canvas.getContext('2d');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.save();
  ctx.scale(-1, 1);
  ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
  ctx.restore();

  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const data = imageData.data;
  let skinPixels = 0;
  let totalPixels = 0;

  for (let i = 0; i < data.length; i += 16) {
    const r = data[i];
    const g = data[i + 1];
    const b = data[i + 2];
    if (r > 95 && g > 40 && b > 20 &&
        Math.max(r, g, b) - Math.min(r, g, b) > 15 &&
        Math.abs(r - g) > 15 && r > g && r > b &&
        !(Math.max(r, g, b) - Math.min(r, g, b) < 20 && r > 210 && g > 210 && b > 210)) {
      skinPixels++;
    }
    totalPixels++;
  }
  return skinPixels / totalPixels > 0.12;
}

function startHandDetection() {
  if (handDetectionInterval) return;
  stableCount = 0;
  handDetectionInterval = setInterval(() => {
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      const detected = detectHandInFrame();
      if (detected) {
        stableCount++;
        handDetected = true;
        palmRing.style.opacity = '1';
        palmRing.style.transform = 'scale(1.05)';
        palmRing.querySelector('.palm-ring-inner')?.classList.add('detected');
        const secsLeft = Math.ceil((STABLE_FRAMES - stableCount) * 0.2);
        if (stableCount >= STABLE_FRAMES) {
          captureAndRead();
          return;
        }
        hintTxt.innerHTML = `<strong style="color:var(--soft)">✓ Palm detected!</strong> Hold steady… capturing in ${secsLeft}s`;
      } else {
        stableCount = 0;
        handDetected = false;
        palmRing.style.opacity = '0.45';
        palmRing.style.transform = 'scale(1)';
        palmRing.querySelector('.palm-ring-inner')?.classList.remove('detected');
        hintTxt.innerHTML = 'Position your <strong>open palm</strong> in the frame. I\'ll capture when it\'s detected.';
      }
    }
  }, 200);
}

function stopHandDetection() {
  if (handDetectionInterval) {
    clearInterval(handDetectionInterval);
    handDetectionInterval = null;
  }
  handDetected = false;
}

// ── App ────────────────────────────────────────────
let stream=null, imgBase64=null, history=[], busy=false;
let userDob = null;
let userName = null;
let conversationLogs = [];
const LOG_STORAGE_KEY = 'luminaConversationLogs';

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const scanBar = document.getElementById('scan-bar');
const scanLbl = document.getElementById('scan-label');
const palmRing = document.getElementById('palm-ring');
const noCam = document.getElementById('no-cam-msg');
const hintTxt = document.getElementById('hint-text');
const startBtn = document.getElementById('start-btn');
const capBtn = document.getElementById('capture-btn');
const chatScroll = document.getElementById('chat-scroll');
const chatInput = document.getElementById('chat-input');
const sendBtn = document.getElementById('send-btn');

// ── Logging helpers (for spreadsheet-style export) ──
(function initLogs() {
  try {
    const raw = localStorage.getItem(LOG_STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (Array.isArray(parsed)) conversationLogs = parsed;
    }
  } catch (e) {
    console.warn('Failed to load logs', e);
  }
})();

function appendLog(role, text) {
  try {
    const entryName = userName || 'unknown';
    const entryDob = userDob || 'unknown';
    const entry = {
      name: entryName,
      dob: entryDob,
      role,
      text,
      ts: new Date().toISOString()
    };
    conversationLogs.push(entry);
    localStorage.setItem(LOG_STORAGE_KEY, JSON.stringify(conversationLogs));
  } catch (e) {
    console.warn('Failed to append log', e);
  }
}

function checkUserInfo() {
  const nameRaw = (document.getElementById('full-name')?.value || '').trim();
  const m = document.getElementById('dob-month').value;
  const d = parseInt(document.getElementById('dob-day').value, 10);
  const y = parseInt(document.getElementById('dob-year').value, 10);

  const nameValid = nameRaw.length >= 2;
  const dobValid = m && d >= 1 && d <= 31 && y >= 1920 && y <= 2030;
  const valid = nameValid && dobValid;

  if (startBtn) startBtn.disabled = !valid;
  userName = nameValid ? nameRaw : null;
  userDob = dobValid ? `${m}/${d}/${y}` : null;
}
// Bind validation via JS (inline handlers can be blocked by CSP on Vercel)
document.getElementById('full-name')?.addEventListener('input', checkUserInfo);
document.getElementById('dob-month')?.addEventListener('change', checkUserInfo);
document.getElementById('dob-day')?.addEventListener('input', checkUserInfo);
document.getElementById('dob-year')?.addEventListener('input', checkUserInfo);
checkUserInfo();

const SYSTEM = `You are Lumina, a warm palm reading AI. Be concise and to the point. Avoid flowery or lengthy prose.

IMPORTANT: If you cannot clearly see a palm in the image (no palm visible, wrong angle, or image too blurry to make out lines), do NOT attempt a reading. Instead, respond with a brief, friendly message such as: "I'm not able to see your palm clearly enough to give a reading. The image may be too blurry, or your palm might not be fully in frame. Try capturing again with your palm open, facing the camera, and in good lighting." Only provide a palm reading when you can clearly see the palm and its lines.

Your reading must be based on BOTH the palm image AND the person's date of birth. Incorporate astrological/age insights where relevant (life phase, generational influences, etc.) while interpreting the palm lines.

When given a clear palm image and the person's date of birth, format your initial reading as follows:

1. **Overall Summary** — Start with 2–3 brief sentences summarizing the person's palm as a whole. No filler.

2. **Line-by-line** — Use this format for each major line. Keep each section to 1–2 sentences max:
   **Heart Line**
   [One or two concise sentences about emotions, love, relationships.]

   **Head Line**
   [One or two concise sentences about mind and approach to life.]

   **Life Line**
   [One or two concise sentences about vitality and life path.]

   **Fate Line** (if visible)
   [Brief take on career/destiny.]

   **Notable Marks** (if any)
   [Brief note on stars, crosses, islands.]

3. **Suggested Questions** — End the initial reading with exactly 3 short questions the reader could ask next, formatted like:
   **Questions to explore:**
   • [Question 1]
   • [Question 2]
   • [Question 3]

Be direct. Each line interpretation should be 1–2 sentences. Use **bold** for section titles. Speak to "you."

For follow-up questions, keep answers brief (2–4 sentences). Stay in character. Reference their palm when relevant. Do not repeat the full sectioned format for follow-ups.`;

function toApiContents(contents) {
  return contents.map(c => ({
    role: c.role || 'user',
    parts: c.parts.map(p => {
      if (p.inlineData) {
        return { inlineData: { mimeType: p.inlineData.mimeType, data: p.inlineData.data } };
      }
      return { text: p.text };
    })
  }));
}

async function callGemini(contents, maxTokens = 2000) {
  const payload = {
    systemInstruction: { parts: [{ text: SYSTEM }] },
    generationConfig: { maxOutputTokens: maxTokens },
    contents: toApiContents(contents)
  };
  const res = await fetch('/api/gemini', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: GEMINI_MODEL, payload })
  });
  const text = await res.text();
  if (!res.ok) {
    let detail = text;
    try {
      const j = JSON.parse(text);
      detail = j.error?.message || j.error || JSON.stringify(j);
    } catch { /* keep raw */ }
    throw new Error(`API error: ${res.status} — ${detail}`);
  }
  let data;
  try {
    data = JSON.parse(text);
  } catch {
    throw new Error('Invalid JSON from server. Is /api/gemini deployed? Check Vercel → Functions.');
  }
  const out = data.candidates?.[0]?.content?.parts?.[0]?.text;
  if (!out) throw new Error(data.error?.message || 'No response from model');
  return out;
}

async function startCamera() {
  startBtn.disabled = true;
  hintTxt.innerHTML = '<em>Connecting to the mystic eye…</em>';
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'user',width:{ideal:1280},height:{ideal:960}}
    }).catch(()=>navigator.mediaDevices.getUserMedia({video:true}));
    video.srcObject = stream;
    await video.play();
    noCam.style.display='none';
    hintTxt.innerHTML='Position your <strong>open palm</strong> in the frame. I\'ll capture when it\'s detected.';
    startHandDetection();
  } catch {
    hintTxt.textContent='Camera access denied — please allow permissions and refresh.';
    startBtn.disabled=false;
    noCam.style.display='flex';
  }
}

function captureAndRead() {
  if(!stream || !video.videoWidth) return;
  capBtn.disabled=true; startBtn.disabled=true;
  stopHandDetection();
  palmRing.style.display='none';
  scanBar.classList.add('active');
  scanLbl.classList.add('active');
  hintTxt.innerHTML='<em>Gazing into the lines of your destiny…</em>';

  setTimeout(()=>{
    canvas.width=video.videoWidth||640; canvas.height=video.videoHeight||480;
    const c=canvas.getContext('2d');
    c.save(); c.scale(-1,1); c.drawImage(video,-canvas.width,0,canvas.width,canvas.height); c.restore();
    imgBase64=canvas.toDataURL('image/jpeg',.9).split(',')[1];
    stream.getTracks().forEach(t=>t.stop());
    scanBar.classList.remove('active'); scanLbl.classList.remove('active');

    document.getElementById('camera-section').style.display='none';
    const rs=document.getElementById('reading-section');
    rs.classList.add('active'); rs.style.display='flex';
    document.getElementById('captured-img').src='data:image/jpeg;base64,'+imgBase64;
    document.getElementById('reset-row').style.display='block';

    beginReading();
  }, 3200);
}

async function beginReading() {
  history=[]; chatScroll.innerHTML='';
  addTyping();

  try {
    const dobStr = userDob || 'not provided';
    const contents = [{
      parts: [
        { inlineData: { mimeType: 'image/jpeg', data: imgBase64 } },
        { text: `Read my palm. My date of birth is ${dobStr}. Base your reading on BOTH my palm lines AND my birth date. If you cannot see a palm clearly, or the image is too blurry, say so and suggest recapturing. If you can read it: start with a brief overall summary, cover each major line (Heart, Head, Life, Fate, notable marks) concisely—1–2 sentences per line. End with 3 suggested questions I could ask next.` }
      ]
    }];

    const reply = await callGemini(contents, 2000);
    removeTyping();

    history = [
      { role: 'user', parts: [{ inlineData: { mimeType: 'image/jpeg', data: imgBase64 } }, { text: `Read my palm. My DOB is ${dobStr}. Base reading on palm + birth date. Brief summary, concise line-by-line, 3 suggested questions.` }] },
      { role: 'model', parts: [{ text: reply }] }
    ];
    addMsg('ai', reply);
    renderQuestionButtons(reply);
  } catch (err) {
    removeTyping();
    console.error('Error:', err);
    addMsg('ai','The stars are clouded… Check your Gemini API key and try again. Get a key at https://aistudio.google.com/apikey');
  }
  chatInput.disabled=false; sendBtn.disabled=false; chatInput.focus();
}

function parseSuggestedQuestions(text) {
  const questions = [];
  const idx = text.search(/\*\*Questions to explore\*\*|Questions to explore|suggested questions/i);
  if (idx === -1) return questions;
  const rest = text.slice(idx);
  const lines = rest.split(/\n/);
  for (let i = 0; i < lines.length; i++) {
    const trimmed = lines[i].trim();
    const m = trimmed.match(/^[•\-\*]\s*(.+)/) || trimmed.match(/^\d+\.\s*(.+)/);
    if (m && m[1].trim().length > 3) questions.push(m[1].trim());
  }
  return questions.slice(0, 3);
}

function renderQuestionButtons(replyText) {
  const container = document.getElementById('question-buttons');
  container.innerHTML = '';
  const questions = parseSuggestedQuestions(replyText);
  if (questions.length === 0) { container.style.display = 'none'; return; }
  questions.forEach(q => {
    const btn = document.createElement('button');
    btn.className = 'q-btn';
    btn.textContent = q;
    btn.onclick = () => sendMessage(q);
    container.appendChild(btn);
  });
  container.style.display = 'flex';
}

async function sendMessage(prefilled) {
  const text = (typeof prefilled === 'string' ? prefilled : chatInput.value.trim()).trim();
  if(!text||busy) return;
  busy=true; chatInput.value=''; sendBtn.disabled=true;
  addMsg('user', text);

  history.push({ role: 'user', parts: [{ text }] });
  addTyping();

  try {
    const contents = history.map(m => ({
      role: m.role === 'model' ? 'model' : 'user',
      parts: m.parts
    }));

    const reply = await callGemini(contents, 1500);
    removeTyping();
    history.push({ role: 'model', parts: [{ text: reply }] });
    addMsg('ai', reply);
  } catch (err) {
    removeTyping();
    console.error('Error:', err);
    addMsg('ai','The connection flickered… try again.');
  }
  busy=false; sendBtn.disabled=false; chatInput.focus();
}

function handleKey(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} }

function formatAiText(text) {
  const esc = (s) => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  return esc(text)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
}

function addMsg(role, text){
  const d=document.createElement('div'); d.className=`msg ${role}`;
  const formatted = formatAiText(text);
  d.innerHTML=`<div class="avatar">${role==='ai'?'🌙':'✋'}</div><div class="bubble">${formatted}</div>`;
  chatScroll.appendChild(d); chatScroll.scrollTop=chatScroll.scrollHeight;
  appendLog(role, text);
  if (role === 'ai') {
    attachFeedbackBox(d, text);
  }
}

function attachFeedbackBox(msgEl, aiText) {
  try {
    const bubble = msgEl.querySelector('.bubble');
    if (!bubble) return;
    const box = document.createElement('div');
    box.className = 'feedback-box';
    box.innerHTML = `
      <div>Was this answer helpful?</div>
      <div class="feedback-buttons">
        <button class="feedback-btn pos">👍 Like</button>
        <button class="feedback-btn neg">👎 Don't like</button>
      </div>
      <div class="feedback-detail">
        <div>Tell Lumina what worked or what missed:</div>
        <textarea placeholder="Share a short note about this response…"></textarea>
        <button type="button">Send feedback</button>
      </div>
    `;
    bubble.appendChild(box);

    const [likeBtn, dislikeBtn] = box.querySelectorAll('.feedback-btn');
    const detail = box.querySelector('.feedback-detail');
    const textarea = detail.querySelector('textarea');
    const submitBtn = detail.querySelector('button');

    function handleThumb(sentiment) {
      likeBtn.disabled = true;
      dislikeBtn.disabled = true;
      appendLog('feedback', JSON.stringify({ sentiment, aiText }));
      detail.style.display = 'flex';
    }

    likeBtn.addEventListener('click', () => handleThumb('like'));
    dislikeBtn.addEventListener('click', () => handleThumb('dislike'));

    submitBtn.addEventListener('click', () => {
      const txt = (textarea.value || '').trim();
      if (!txt) {
        detail.style.display = 'none';
        return;
      }
      appendLog('feedback-detail', txt);
      detail.style.display = 'none';
    });
  } catch (e) {
    console.warn('Failed to attach feedback box', e);
  }
}

function addTyping(){
  const d=document.createElement('div'); d.className='msg ai'; d.id='typing';
  d.innerHTML=`<div class="avatar">🌙</div><div class="bubble"><div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  chatScroll.appendChild(d); chatScroll.scrollTop=chatScroll.scrollHeight;
}

function removeTyping(){ const el=document.getElementById('typing'); if(el) el.remove(); }

function newReading(){
  imgBase64=null; history=[]; stream=null; busy=false;
  stopHandDetection();
  document.getElementById('reading-section').style.display='none';
  document.getElementById('reading-section').classList.remove('active');
  document.getElementById('camera-section').style.display='';
  document.getElementById('reset-row').style.display='none';
  video.srcObject=null; video.style.display='block';
  palmRing.style.display='flex';
  palmRing.style.opacity='0.45';
  palmRing.querySelector('.palm-ring-inner')?.classList.remove('detected');
  scanBar.classList.remove('active'); scanLbl.classList.remove('active');
  // Keep the name/DOB in the inputs, but re-validate gating
  checkUserInfo();
  capBtn.disabled=true;
  chatInput.disabled=true; sendBtn.disabled=true;
  chatScroll.innerHTML='';
  document.getElementById('question-buttons').innerHTML='';
  document.getElementById('question-buttons').style.display='none';
  hintTxt.innerHTML='Place your <strong>open palm</strong> in the frame. Lumina will capture when your palm is detected.';
}

function exportLogs(){
  if (!conversationLogs.length) {
    alert('No logs to export yet.');
    return;
  }
  const logs = [...conversationLogs].sort((a,b) => {
    const na = (a.name || '').localeCompare(b.name || '');
    if (na !== 0) return na;
    const da = (a.dob || '').localeCompare(b.dob || '');
    if (da !== 0) return da;
    return (a.ts || '').localeCompare(b.ts || '');
  });
  let csv = '';
  let currentName = null;
  const esc = (s) => `"${String(s ?? '').replace(/"/g,'""')}"`;
  logs.forEach(entry => {
    const name = entry.name || 'unknown';
    if (name !== currentName) {
      if (currentName !== null) csv += '\n';
      currentName = name;
      csv += `Name: ${currentName}\n`;
      csv += 'timestamp,role,dob,message\n';
    }
    csv += `${esc(entry.ts)},${esc(entry.role)},${esc(entry.dob || 'unknown')},${esc(entry.text)}\n`;
  });
  const blob = new Blob([csv], { type:'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `lumina-logs-${date}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
// Expose for inline handlers (onclick etc.)
